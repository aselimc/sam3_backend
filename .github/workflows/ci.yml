name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      # Lint with ruff directly — no need to resolve heavy project deps
      - name: Run ruff check
        run: uvx ruff check .

      - name: Run ruff format check
        run: uvx ruff format --check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install test dependencies
        run: |
          uv venv
          uv pip install pytest pytest-asyncio httpx \
            fastapi pydantic pydantic-settings uvicorn pillow "numpy<2" \
            python-multipart loguru prometheus-fastapi-instrumentator \
            opencv-python-headless

      - name: Run tests
        run: uv run pytest tests/ -v
